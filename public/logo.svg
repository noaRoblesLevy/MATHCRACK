<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#040811"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Outer ring -->
  <rect width="100" height="100" rx="22" fill="none"
    stroke="#60a5fa" stroke-width="1.5" opacity="0.35"/>

  <!-- Lightning bolt — the "crack" in MATHCRACK -->
  <polygon
    points="57,8 36,52 50,52 43,92 64,48 50,48"
    fill="#60a5fa"
    filter="url(#glow)"
    opacity="0.95"/>

  <!-- Inner highlight on bolt -->
  <polygon
    points="54,16 40,50 51,50 46,80 60,50 49,50"
    fill="#e4ecff"
    opacity="0.25"/>
</svg>
